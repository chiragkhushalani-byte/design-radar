<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F3;--surface:#fff;--surface2:#F2F1EE;--border:#E5E3DE;--border2:#D0CEC8;
  --text:#1A1917;--text2:#6B6860;--text3:#A09E99;
  --accent:#E24B4A;--accent-dark:#B83A39;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --green:#1D9E75;--green-light:#E1F5EE;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --purple:#3C3489;--purple-light:#EEEDFE;
  --r-md:8px;--r-lg:12px;--r-xl:16px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.logo{padding:16px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.logomark{width:22px;height:22px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center}
.logo-text{font-size:14px;font-weight:500;letter-spacing:-.01em}
.nav{padding:8px;flex:1;overflow-y:auto}
.nl{font-size:10px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:10px 8px 4px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--r-md);font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s;user-select:none}
.ni svg{flex-shrink:0;opacity:.7}
.ni:hover{background:var(--surface2);color:var(--text)}
.ni.active{background:var(--surface2);color:var(--text);font-weight:500}
.ni.active svg{opacity:1}
.nbadge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:500;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center}
.timer-mini{margin:0 8px 12px;background:var(--surface2);border-radius:var(--r-lg);padding:11px 12px;border:1px solid var(--border)}
.tm-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.tm-d{font-size:20px;font-weight:500;color:var(--text);font-family:var(--mono);letter-spacing:.02em}
.tm-t{font-size:10px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tm-btns{display:flex;gap:5px;margin-top:9px}
.tm-btn{flex:1;padding:5px 0;font-size:11px;border:1px solid var(--border2);border-radius:var(--r-md);background:var(--surface);color:var(--text);cursor:pointer;font-family:var(--font);transition:all .12s;font-weight:500}
.tm-btn:hover{background:var(--border)}
.tm-btn.running{background:var(--accent);color:#fff;border-color:var(--accent)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.tb-title{font-size:14px;font-weight:500;flex:1;letter-spacing:-.01em}
.tb-sub{font-size:11px;color:var(--text3)}
.btn{padding:7px 14px;font-size:12px;border:1px solid var(--border2);border-radius:var(--r-md);background:var(--surface);color:var(--text);cursor:pointer;font-family:var(--font);transition:all .12s;font-weight:500}
.btn:hover{background:var(--surface2)}
.btn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.accent:hover{background:var(--accent-dark)}
.content{flex:1;overflow-y:auto;padding:18px 20px}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:18px}
.mc{background:var(--surface2);border-radius:var(--r-md);padding:13px 14px}
.mc-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.mc-v{font-size:22px;font-weight:500;color:var(--text);line-height:1;letter-spacing:-.02em}
.mc-s{font-size:10px;color:var(--text3);margin-top:3px}
.mc.red .mc-v{color:var(--red)}.mc.green .mc-v{color:var(--green)}.mc.amber .mc-v{color:var(--amber)}.mc.blue .mc-v{color:var(--blue)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px}
.ph{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between}
.pt{font-size:12px;font-weight:500}
.pa{font-size:11px;color:var(--blue);cursor:pointer;background:none;border:none;font-family:var(--font);padding:0;font-weight:500}
.pa:hover{opacity:.75}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:9px 13px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2)}
td{padding:9px 13px;font-size:12px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
.tr{cursor:pointer;transition:background .1s}
.tr:hover{background:var(--surface2)}
tr.task-row{cursor:grab;transition:background .1s}
tr.task-row:hover{background:var(--surface2)}
tr.task-row.dragging{opacity:.35}
tr.task-row.dragover{outline:2px solid var(--blue);outline-offset:-1px}
.badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.bc{background:var(--red-light);color:var(--red)}.bh{background:var(--amber-light);color:var(--amber)}
.bm{background:var(--blue-light);color:var(--blue)}.bl{background:var(--green-light);color:var(--green)}
.s-todo{background:var(--surface2);color:var(--text2)}.s-inprogress{background:var(--blue-light);color:var(--blue)}
.s-review{background:var(--amber-light);color:var(--amber)}.s-done{background:var(--green-light);color:var(--green)}
.risk-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;background:var(--red-light);color:var(--red);padding:2px 7px;border-radius:20px;font-weight:500}
.ds-sel{font-size:11px;border:1px solid var(--border);border-radius:6px;padding:3px 6px;background:var(--surface2);color:var(--text);font-family:var(--font);cursor:pointer;width:100%}
.ds-sel:focus{outline:none}
.bar-bg{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.bar-fill{height:4px;border-radius:2px;transition:width .4s}
.bf-blue{background:#378ADD}.bf-green{background:var(--green)}.bf-amber{background:#EF9F27}.bf-red{background:var(--accent)}.bf-purple{background:#7F77DD}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.av0{background:var(--blue-light);color:var(--blue)}.av1{background:var(--green-light);color:var(--green)}
.av2{background:var(--purple-light);color:var(--purple)}.av3{background:var(--amber-light);color:var(--amber)}.av4{background:#E1F5EE;color:#0F6E56}
.log-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);transition:background .1s}
.log-row:last-child{border-bottom:none}
.log-row:hover{background:var(--surface2)}
.log-dur{font-size:12px;font-weight:500;font-family:var(--mono);min-width:44px;text-align:right}
.play-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .12s}
.play-btn:hover{background:var(--surface2)}
.two-col{display:grid;grid-template-columns:1fr 288px;gap:14px;margin-bottom:14px}
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.st{font-size:13px;font-weight:500;letter-spacing:-.01em}
.filters{display:flex;gap:5px}
.fb{font-size:11px;border:1px solid var(--border);border-radius:20px;padding:4px 10px;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .12s;font-weight:500}
.fb:hover{background:var(--surface2);color:var(--text)}
.fb.active{background:var(--text);color:var(--surface);border-color:var(--text)}
.inbox-item{padding:10px 14px;border-bottom:1px solid var(--border);transition:background .12s}
.inbox-item:last-child{border-bottom:none}
.inbox-item:hover{background:var(--surface2)}
.ii-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px}
.ii-dot.read{background:var(--border2)}
.assign-btn{font-size:10px;background:var(--blue-light);color:var(--blue);border:none;border-radius:var(--r-md);padding:3px 8px;cursor:pointer;font-family:var(--font);font-weight:500}
.assign-btn:hover{opacity:.8}
.ai-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:4px}
.ai-head{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:7px}
.ai-pulse{width:7px;height:7px;border-radius:50%;background:var(--green)}
.ai-body{padding:13px 14px;font-size:13px;line-height:1.7;color:var(--text2)}
.ai-body b{color:var(--text);font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px 11px}
.chip{font-size:11px;border:1px solid var(--border2);border-radius:20px;padding:4px 11px;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .12s;font-weight:500}
.chip:hover{background:var(--surface2);color:var(--text)}
.ai-ir{display:flex;gap:7px;padding:10px 14px;border-top:1px solid var(--border)}
.ai-inp{flex:1;font-size:12px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r-md);background:var(--surface2);color:var(--text);font-family:var(--font)}
.ai-inp:focus{outline:none;border-color:var(--border2)}
.thinking{display:flex;gap:4px;align-items:center;padding:4px 0}
.td2{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:blink 1.1s ease-in-out infinite}
.td2:nth-child(2){animation-delay:.18s}.td2:nth-child(3){animation-delay:.36s}
@keyframes blink{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.loading-state{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);font-size:13px;gap:8px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{padding:32px;text-align:center;font-size:12px;color:var(--text3)}
.modal-overlay{position:fixed;inset:0;background:rgba(26,25,23,.45);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .18s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:480px;max-width:calc(100vw - 32px);overflow:hidden;transform:translateY(8px) scale(.98);transition:transform .18s}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:500;letter-spacing:-.01em}
.modal-close{width:28px;height:28px;border-radius:var(--r-md);border:1px solid var(--border);background:transparent;cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:var(--font)}
.modal-close:hover{background:var(--surface2)}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.mfield{display:flex;flex-direction:column;gap:5px}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mfield label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.mfield input,.mfield select,.mfield textarea{padding:8px 10px;font-size:13px;border:1px solid var(--border2);border-radius:var(--r-md);background:var(--surface2);color:var(--text);font-family:var(--font);transition:border-color .12s;width:100%}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{outline:none;border-color:var(--blue);background:var(--surface)}
.mfield textarea{resize:none;height:64px;line-height:1.5}
.name-options{display:flex;flex-direction:column;gap:4px;max-height:150px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r-md);padding:5px}
.name-opt{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:var(--r-md);cursor:pointer;transition:background .12s}
.name-opt:hover{background:var(--surface2)}
.name-opt.selected{background:var(--blue-light)}
.name-opt input[type=radio]{accent-color:var(--blue);cursor:pointer}
.or-add{display:flex;align-items:center;gap:8px;margin-top:4px}
.or-add input{flex:1;padding:7px 10px;font-size:13px;border:1px solid var(--border2);border-radius:var(--r-md);background:var(--surface2);color:var(--text);font-family:var(--font)}
.or-add input:focus{outline:none;border-color:var(--blue)}
.or-add input::placeholder{color:var(--text3)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:var(--surface);padding:9px 18px;border-radius:var(--r-lg);font-size:12px;font-weight:500;opacity:0;transition:all .25s;z-index:2000;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px}
.lock-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 28px;width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;gap:16px}
.lock-logo{width:44px;height:44px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center}
.lock-title{font-size:16px;font-weight:500;letter-spacing:-.02em;color:var(--text);text-align:center;margin-bottom:-8px}
.lock-sub{font-size:12px;color:var(--text2);text-align:center;line-height:1.5}
.lock-input-wrap{width:100%;display:flex;flex-direction:column;gap:8px}
.lock-input{width:100%;padding:10px 14px;font-size:14px;border:1px solid var(--border2);border-radius:var(--r-md);background:var(--surface2);color:var(--text);font-family:var(--mono);letter-spacing:.18em;text-align:center;transition:border-color .15s,background .15s}
.lock-input:focus{outline:none;border-color:var(--blue);background:var(--surface)}
.lock-input.shake{animation:shake .35s ease}
.lock-input.error{border-color:var(--accent)!important;background:var(--red-light)!important}
.lock-err{font-size:12px;color:var(--red);text-align:center;min-height:16px;font-weight:500}
.lock-btn{width:100%;padding:10px;font-size:13px;font-weight:500;border:none;border-radius:var(--r-md);background:var(--accent);color:#fff;cursor:pointer;font-family:var(--font);transition:all .15s}
.lock-btn:hover{background:var(--accent-dark)}
.lock-btn:active{transform:scale(.98)}
.lock-footer{font-size:11px;color:var(--text3);text-align:center}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logomark"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#fff" stroke-width="1.3"/><circle cx="6" cy="6" r="1.8" fill="#fff"/></svg></div>
      <span class="logo-text">Design Radar</span>
    </div>
    <div class="nav">
      <div class="ni active" onclick="go('dashboard')"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.1"/><rect x="8" y="1" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.1"/><rect x="1" y="8" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.1"/><rect x="8" y="8" width="5" height="5" rx="1.2" stroke="currentColor" stroke-width="1.1"/></svg>Dashboard</div>
      <div class="nl">Work</div>
      <div class="ni" onclick="go('sprint')"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M2 7h7M2 10h8" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>Sprint tasks</div>
      <div class="ni" onclick="go('inbox')" id="inboxNi"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 3h10v7a1 1 0 01-1 1H3a1 1 0 01-1-1V3z" stroke="currentColor" stroke-width="1.1"/><path d="M2 7h3l1.5 2h1L9 7h3" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/></svg>PM requests<span class="nbadge" id="inboxBadge" style="display:none">0</span></div>
      <div class="nl">Time</div>
      <div class="ni" onclick="go('timelog')"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7.5" r="5" stroke="currentColor" stroke-width="1.1"/><path d="M7 5v3l2 1" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><path d="M5.5 1.5h3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>Time log</div>
      <div class="ni" onclick="go('reports')"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="2" y="2" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.1"/><path d="M5 9V7M7 9V5M9 9V6" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>Reports</div>
      <div class="nl">Team</div>
      <div class="ni" onclick="go('capacity')"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="5" cy="4" r="2.2" stroke="currentColor" stroke-width="1.1"/><path d="M1.5 12c0-2 1.567-3.5 3.5-3.5S8.5 10 8.5 12" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><circle cx="10" cy="4.5" r="1.8" stroke="currentColor" stroke-width="1.1"/><path d="M12 12c0-1.5-1.2-2.8-2.5-3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>Capacity</div>
    </div>
    <div class="timer-mini">
      <div class="tm-l">Timer</div>
      <div class="tm-d" id="sideTimer">00:00:00</div>
      <div class="tm-t" id="sideTimerTask">No task running</div>
      <div class="tm-btns">
        <button class="tm-btn" id="sideTimerBtn" onclick="toggleTimer()">Start</button>
        <button class="tm-btn" onclick="stopTimer()">Stop</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <span class="tb-title" id="viewTitle">Dashboard</span>
      <span class="tb-sub" id="viewSub">Loading…</span>
      <button class="btn" onclick="quickAddTime()">+ Log time</button>
      <button class="btn accent" onclick="openAddTask()">+ Add task</button>
    </div>
    <div class="content" id="content"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Add task</span>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="mfield">
        <label>Task name</label>
        <input type="text" id="f-name" placeholder="e.g. MF redesign – onboarding flow"/>
      </div>
      <div class="mfield">
        <label>Assign to designer</label>
        <div class="name-options" id="name-options"></div>
        <div class="or-add">
          <input type="text" id="f-newname" placeholder="Or type a new name…"/>
        </div>
      </div>
      <div class="mrow">
        <div class="mfield"><label>Priority</label>
          <select id="f-priority"><option value="critical">Critical</option><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select>
        </div>
        <div class="mfield"><label>Status</label>
          <select id="f-status"><option value="todo" selected>To do</option><option value="inprogress">In progress</option><option value="review">Review</option><option value="done">Done</option></select>
        </div>
      </div>
      <div class="mrow">
        <div class="mfield"><label>Effort (pts)</label>
          <select id="f-effort"><option value="1">1 — quick</option><option value="2" selected>2 — small</option><option value="3">3 — medium</option><option value="4">4 — large</option><option value="5">5 — epic</option></select>
        </div>
        <div class="mfield"><label>Jira ref</label>
          <input type="text" id="f-jira" placeholder="e.g. MFD-113"/>
        </div>
      </div>
      <div class="mfield">
        <label>Notes (optional)</label>

const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
const HR={...H,'Prefer':'return=representation'};

async function sb(path,opts={}){
  const res=await fetch(`${SB}/rest/v1/${path}`,{headers:H,...opts});
  if(!res.ok){const t=await res.text();throw new Error(t);}
  const ct=res.headers.get('content-type')||'';
  return ct.includes('json')&&res.status!==204?res.json():null;
}

let DESIGNERS=[],tasks=[],timeLogs=[],requests=[];
let currentView='dashboard',sprintFilter='all',logFilter='all';

const AV=['av0','av1','av2','av3','av4'];
function avFor(name){const d=DESIGNERS.find(x=>x.name===name);return d?AV[d.avatar_index%AV.length]:'av0';}
function iniFor(name){const d=DESIGNERS.find(x=>x.name===name);return d?d.initials:name.slice(0,2).toUpperCase();}

function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;}
function fmtMins(m){if(!m||m<1)return'0m';if(m<60)return`${m}m`;const h=Math.floor(m/60),r=m%60;return r>0?`${h}h ${r}m`:`${h}h`;}
function fmtDate(iso){if(!iso)return'—';try{return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}catch{return iso;}}

function toast(msg,dur=2200){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

async function loadAll(){

function getLoad(){
  const l={};
  (DESIGNERS||[]).forEach(d=>{l[d.name]={effort:0,count:0,tasks:[],mins:0}});
  (tasks||[]).forEach(t=>{if(l[t.designer_name]){l[t.designer_name].effort+=t.effort;l[t.designer_name].count++;l[t.designer_name].tasks.push(t);l[t.designer_name].mins+=t.logged_mins||0;}});

}

function renderAI(ctx){
  const ph=ctx==='inbox'?'Who should take this?':ctx==='capacity'?'Who has bandwidth?':'Ask about time, risks, or the sprint...';
  return`<div class="ai-wrap">
    <div class="ai-head"><div class="ai-pulse"></div><span style="font-size:12px;font-weight:500">Radar AI</span><span style="font-size:11px;color:var(--text3);margin-left:4px">design assistant</span></div>

      <button class="chip" onclick="askAI('bandwidth')">Who has bandwidth?</button>

      <button class="chip" onclick="askAI('standup')">Standup summary</button>
    </div>
    <div class="ai-ir"><input class="ai-inp" id="aiInput" placeholder="${ph}" onkeydown="if(event.key==='Enter')sendAI()"/><button class="btn" onclick="sendAI()">Ask</button></div>
  </div>`;
}

function buildAIContext(){
  const load=getLoad();
  const risk=(tasks||[]).filter(t=>t.risk);
  const ua=(requests||[]).filter(r=>!r.assigned).length;
  const totalMins=(timeLogs||[]).reduce((s,l)=>s+l.mins,0);
  const avail=Object.entries(load).filter(([,l])=>l.effort<=4).map(([n])=>n);
  const over=Object.entries(load).filter(([,l])=>l.effort>=8).map(([n])=>n);
  return{load,risk,ua,totalMins,avail,over};
}

const AI_RESPONSES={
  bandwidth(){
    const{avail,over,load}=buildAIContext();
    const lines=Object.entries(load).sort((a,b)=>a[1].effort-b[1].effort).map(([n,l])=>`• <b>${n}</b> — ${l.effort}/10 pts (${Math.round(l.effort/10*100)}% load)`).join('<br>');
    return`<b>Current capacity:</b><br><br>${lines}<br><br>${avail.length>0?`<b>Available now:</b> ${avail.join(', ')}`:'All designers are at medium to full capacity.'} ${over.length>0?`<br><b>Overloaded:</b> ${over.join(', ')} — avoid routing new work to them.`:''}`;
  },
  risks(){
    const{risk,ua}=buildAIContext();
    if(risk.length===0&&ua===0) return'No risks detected. All tasks are on track and all requests are assigned.';
    let out='';
    if(risk.length>0) out+=`<b>${risk.length} task${risk.length>1?'s':''} flagged:</b><br><br>`+risk.map((t,i)=>`${i+1}. <b>${t.name}</b> — ${t.risk_note} (${t.designer_name})`).join('<br>');
    if(ua>0) out+=`${out?'<br><br>':''}${ua} PM request${ua>1?'s are':' is'} unassigned in the inbox.`;
    return out;
  },
  time(){
    const{load,totalMins}=buildAIContext();
    const lines=Object.entries(load).sort((a,b)=>b[1].mins-a[1].mins).map(([n,l])=>`• <b>${n}</b> — ${fmtMins(l.mins)} across ${l.count} task${l.count!==1?'s':''}`).join('<br>');
    return`<b>Time breakdown (${fmtMins(totalMins)} total):</b><br><br>${lines||'No time logged yet.'}`;
  },
  standup(){
    const{risk,ua,totalMins}=buildAIContext();
    const done=(tasks||[]).filter(t=>t.status==='done');
    const inReview=(tasks||[]).filter(t=>t.status==='review');
    const inProgress=(tasks||[]).filter(t=>t.status==='inprogress');
    return`<b>Standup summary:</b><br><br>`+
      (done.length?`<b>Done:</b> ${done.map(t=>t.name).join(', ')}<br>`:'')+(inReview.length?`<b>Review:</b> ${inReview.map(t=>t.name).join(', ')}<br>`:'')+(inProgress.length?`<b>In progress:</b> ${inProgress.map(t=>t.name).join(', ')}<br>`:'')+
      `<br><b>Risks:</b> ${risk.length>0?risk.map(t=>t.name).join(', '):'None'}<br><b>PM requests:</b> ${ua} unassigned<br><b>Time logged:</b> ${fmtMins(totalMins)} total`;
  }
};

function askAI(type){
  const b=document.getElementById('aiBody');if(!b)return;
  b.innerHTML=`<div class="thinking"><div class="td2"></div><div class="td2"></div><div class="td2"></div></div>`;
  setTimeout(()=>{
    const fn=AI_RESPONSES[type];
    b.innerHTML=fn?fn():'Ask me about bandwidth, risks, time, or the sprint status.';
  },600);
}

function sendAI(){
  const inp=document.getElementById('aiInput');
  if(!inp||!inp.value.trim())return;
  const v=inp.value.toLowerCase();inp.value='';
  if(v.includes('bandwidth')||v.includes('free')||v.includes('availab')) return askAI('bandwidth');
  if(v.includes('risk')||v.includes('flag')) return askAI('risks');
  if(v.includes('time')||v.includes('hours')||v.includes('log')) return askAI('time');
  if(v.includes('standup')||v.includes('summar')||v.includes('week')) return askAI('standup');
  askAI('risks');
}

function setSF(f,btn){sprintFilter=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function setLF(f,btn){logFilter=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

async function reassign(id,designer){
  try{
    await sb(`tasks?id=eq.${id}`,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify({designer_name:designer})});
    const t=tasks.find(x=>x.id===id);if(t)t.designer_name=designer;
    render();toast('Reassigned to '+designer);
  }catch(e){toast('Error: '+e.message);}
}

async function markAssigned(id){
  try{
    await sb(`requests?id=eq.${id}`,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify({assigned:true,read:true})});
    const r=requests.find(x=>x.id===id);if(r){r.assigned=true;r.read=true;}
    updateBadge();render();toast('Marked as assigned');
  }catch(e){toast('Error: '+e.message);}
}

// --- ADD TASK MODAL ---
function openAddTask(){
  selectedName='';
  ['f-name','f-jira','f-notes','f-newname'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-priority').value='medium';
  document.getElementById('f-status').value='todo';
  document.getElementById('f-effort').value='2';
  renderNameOpts();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),100);
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

function renderNameOpts(){
  const container=document.getElementById('name-options');
  container.innerHTML=(DESIGNERS||[]).map(d=>`<label class="name-opt${selectedName===d.name?' selected':''}" onclick="pickName('${d.name}')"><input type="radio" name="assignee" value="${d.name}"${selectedName===d.name?' checked':''}><span style="font-size:13px">${d.name}</span></label>`).join('');
}

function pickName(name){selectedName=name;document.getElementById('f-newname').value='';renderNameOpts();}

async function submitTask(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){document.getElementById('f-name').style.borderColor='var(--accent)';setTimeout(()=>document.getElementById('f-name').style.borderColor='',1500);return;}
  const btn=document.getElementById('submitTaskBtn');
  btn.disabled=true;btn.textContent='Adding…';
  const newName=document.getElementById('f-newname').value.trim();
  const designer=newName||selectedName||'—';
  if(newName&&!(DESIGNERS||[]).find(d=>d.name===newName)){
    try{
      const nd=await sb('designers',{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify({name:newName,initials:newName.slice(0,2).toUpperCase(),avatar_index:DESIGNERS.length%5})});
      if(nd&&nd[0]) DESIGNERS.push(nd[0]);
    }catch(e){console.warn('Could not add designer:',e);}
  }
  const payload={
    name,pm:'—',designer_name:designer,
    priority:document.getElementById('f-priority').value,
    status:document.getElementById('f-status').value,
    effort:parseInt(document.getElementById('f-effort').value),
    jira_ref:document.getElementById('f-jira').value.trim()||'—',
    notes:document.getElementById('f-notes').value.trim(),
    risk:false,risk_note:'',logged_mins:0
  };
  try{
    const res=await sb('tasks',{method:'POST',headers:HR,body:JSON.stringify(payload)});
    if(res&&res[0]) tasks.unshift(res[0]);
    closeModal();render();toast('Task added');
  }catch(e){toast('Error: '+e.message);}
  btn.disabled=false;btn.textContent='Add task';
}

// --- TIMER ---
function toggleTimer(){
  if(!timerRunning){
    const opts=(tasks||[]).map((t,i)=>`${i+1}. ${t.name}`).join('\n');
    const sel=prompt('Select task number:\n'+opts,'1');
    if(!sel) return;
    const idx=parseInt(sel)-1;
    const t=(tasks||[])[idx];
    if(!t) return;
    timerTaskId=t.id;timerTaskName=t.name;timerRunning=true;
    document.getElementById('sideTimerBtn').textContent='Pause';
    document.getElementById('sideTimerBtn').classList.add('running');
    document.getElementById('sideTimerTask').textContent=t.name.length>22?t.name.slice(0,22)+'…':t.name;
    timerInterval=setInterval(()=>{timerSecs++;document.getElementById('sideTimer').textContent=fmtTime(timerSecs);},1000);
  }else{
    clearInterval(timerInterval);timerInterval=null;timerRunning=false;
    document.getElementById('sideTimerBtn').textContent='Resume';
    document.getElementById('sideTimerBtn').classList.remove('running');
  }
}

async function stopTimer(){
  if(timerSecs>0&&timerTaskId){
    const mins=Math.max(1,Math.round(timerSecs/60));
    const note=prompt('Note for this session:','Design work')||'Timer session';
    const t=(tasks||[]).find(x=>x.id===timerTaskId);
    await saveTimeLog(timerTaskId,timerTaskName,t?.designer_name||'—',mins,note);
  }
  clearInterval(timerInterval);timerInterval=null;timerRunning=false;timerSecs=0;timerTaskId=null;timerTaskName='';
  document.getElementById('sideTimer').textContent='00:00:00';
  document.getElementById('sideTimerBtn').textContent='Start';
  document.getElementById('sideTimerBtn').classList.remove('running');
  document.getElementById('sideTimerTask').textContent='No task running';
}

async function saveTimeLog(taskId,taskName,designerName,mins,note){
  try{
    const today=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    const log={task_id:taskId,task_name:taskName,designer_name:designerName,mins,note,logged_date:today};
    const res=await sb('time_logs',{method:'POST',headers:HR,body:JSON.stringify(log)});
    if(res&&res[0]) timeLogs.unshift(res[0]);
    const tk=(tasks||[]).find(x=>x.id===taskId);
    if(tk){
      tk.logged_mins=(tk.logged_mins||0)+mins;
      await sb(`tasks?id=eq.${taskId}`,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify({logged_mins:tk.logged_mins})});
    }
    render();toast(fmtMins(mins)+' logged');
  }catch(e){toast('Error saving log: '+e.message);}
}

async function quickAddTime(){
  const opts=(tasks||[]).map((t,i)=>`${i+1}. ${t.name}`).join('\n');
  const sel=parseInt(prompt('Task number:\n'+opts,'1'));
  const t=(tasks||[])[sel-1];
  if(!t) return;
  const mins=parseInt(prompt('Minutes?','60')||'0');
  if(!mins||mins<=0) return;
  const note=prompt('Note:','Design work')||'Manual entry';
  await saveTimeLog(t.id,t.name,t.designer_name,mins,note);
}

function resumeFromLog(taskId,taskName){
  if(timerRunning) stopTimer();
  const t=(tasks||[]).find(x=>x.id===taskId);
  if(!t) return;
  timerTaskId=taskId;timerTaskName=taskName||t.name;timerRunning=true;timerSecs=0;
  document.getElementById('sideTimerBtn').textContent='Pause';
  document.getElementById('sideTimerBtn').classList.add('running');
  document.getElementById('sideTimerTask').textContent=timerTaskName.length>22?timerTaskName.slice(0,22)+'…':timerTaskName;
  timerInterval=setInterval(()=>{timerSecs++;document.getElementById('sideTimer').textContent=fmtTime(timerSecs);},1000);
}

// Drag and drop
document.addEventListener('dragstart',e=>{const r=e.target.closest('.task-row');if(r){dragId=r.dataset.id;r.classList.add('dragging');}});
document.addEventListener('dragend',()=>{document.querySelectorAll('.task-row').forEach(r=>r.classList.remove('dragging','dragover'));});
document.addEventListener('dragover',e=>{e.preventDefault();const r=e.target.closest('.task-row');if(r){document.querySelectorAll('.task-row').forEach(x=>x.classList.remove('dragover'));r.classList.add('dragover');}});
document.addEventListener('drop',e=>{
  e.preventDefault();const r=e.target.closest('.task-row');
  if(r&&dragId&&dragId!==r.dataset.id){
    const fi=tasks.findIndex(t=>t.id===dragId),ti=tasks.findIndex(t=>t.id===r.dataset.id);
    if(fi>=0&&ti>=0){const[m]=tasks.splice(fi,1);tasks.splice(ti,0,m);}
    render();
  }
  dragId=null;
});

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.key==='n'&&!e.metaKey&&!e.ctrlKey&&!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) openAddTask();
  if(e.key==='Escape') closeModal();
  if(e.key==='r'&&!e.metaKey&&!e.ctrlKey&&!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)){loadAll();toast('Refreshing…');}
});

// Auto-refresh inbox every 30s
setInterval(async()=>{
  try{
    requests=await sb('requests?select=*&order=created_at.desc');
    updateBadge();
    if(currentView==='inbox') render();
  }catch(e){}
},30000);

loadAll();


// ---- LOCK SCREEN ----
const PASSCODE = 'MISTAKES';
const SESSION_KEY = 'dr_unlocked';

function checkPasscode(){
  const val = document.getElementById('lockInput').value.trim().toUpperCase();
  const inp = document.getElementById('lockInput');
  const err = document.getElementById('lockErr');
  if(val === PASSCODE){
    sessionStorage.setItem(SESSION_KEY,'1');
    const ls = document.getElementById('lockScreen');
    ls.style.opacity='0';ls.style.transition='opacity .3s';
    setTimeout(()=>ls.style.display='none',300);
  } else {
    inp.classList.add('shake','error');
    err.textContent='Wrong passcode. Try again.';
    setTimeout(()=>{inp.classList.remove('shake','error');err.textContent='';inp.value='';inp.focus();},1200);
  }
}

function initLock(){
  if(sessionStorage.getItem(SESSION_KEY)==='1'){
    document.getElementById('lockScreen').style.display='none';
  } else {
    setTimeout(()=>document.getElementById('lockInput').focus(),100);
  }
}

initLock();
</script>
